name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w \
            -X github.com/forechoandlook/gtask/internal/version.Version=${GITHUB_REF_NAME#v} \
            -X github.com/forechoandlook/gtask/internal/version.Commit=${GITHUB_SHA::7} \
            -X github.com/forechoandlook/gtask/internal/gws.BuiltinClientID=${{ secrets.GOOGLE_CLIENT_ID }} \
            -X github.com/forechoandlook/gtask/internal/gws.BuiltinClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            -o dist/gtask_${{ matrix.os }}_${{ matrix.arch }} ./cmd/gtask

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bins-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/gtask_${{ matrix.os }}_${{ matrix.arch }}

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p upload
          find dist -type f -name 'gtask_*' -exec mv {} upload/ \;
          echo "${GITHUB_REF_NAME#v}" > upload/VERSION

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            upload/gtask_*
            upload/VERSION
